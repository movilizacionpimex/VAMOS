# ============================================================
#  DECAP CMS — Configuración para VAMOS
#  Archivo: admin/config.yml
# ============================================================
#
#  IMPORTANTE ANTES DE QUE FUNCIONE:
#  1. En tu panel de Netlify → Site configuration → Identity → Enable Identity
#  2. En Identity → Registration preferences → selecciona "Invite only"
#  3. En Identity → Services → Git Gateway → Enable Git Gateway
#  4. Para invitar a un compañero: Identity → Invite users → ingresa su email
#  5. El compañero recibirá un email para crear su contraseña
#  Después accede en: https://vamosinternacional.org/admin/
# ============================================================

backend:
  name: git-gateway        # Login por email/contraseña sin necesitar cuenta de GitHub
  branch: main             # Rama principal del repositorio (cámbiala a "master" si aplica)

# Carpeta donde se guardan las imágenes subidas desde el CMS
media_folder: "img/uploads"
public_folder: "/img/uploads"

# ============================================================
#  COLECCIONES — Qué puede editar el equipo
# ============================================================

collections:

  # ----------------------------------------------------------
  #  1. TESTIMONIOS
  #     Testimonios de servidores/voluntarios y organizaciones.
  #     Se guardan como archivos Markdown en /data/testimonios/.
  # ----------------------------------------------------------
  - name: "testimonios"
    label: "💬 Testimonios"
    label_singular: "Testimonio"
    folder: "data/testimonios"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - label: "Nombre"
        name: "title"
        widget: "string"
        hint: "Nombre de la persona (puede ser solo el primer nombre)."

      - label: "Rol"
        name: "rol"
        widget: "string"
        default: "Servidor / Voluntario"
        hint: "Ej: Servidor / Voluntario, Coordinador de OSC, Organización aliada"

      - label: "Testimonio"
        name: "body"
        widget: "markdown"
        hint: "El texto del testimonio. Escríbelo en primera persona."

      - label: "Mostrar en Home"
        name: "featured"
        widget: "boolean"
        default: true

  # ----------------------------------------------------------
  #  2. CONFIGURACIÓN GENERAL DEL SITIO
  #     Datos de contacto y redes sociales.
  # ----------------------------------------------------------
  - name: "config"
    label: "⚙️ Configuración del Sitio"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "Datos Generales"
        file: "data/config.yml"
        fields:
          - label: "Teléfono"
            name: "telefono"
            widget: "string"
            required: false
            hint: "Con código de país. Ej: +52 614 000 0000"

          - label: "Correo de Contacto"
            name: "email"
            widget: "string"

          - label: "Dirección"
            name: "direccion"
            widget: "string"

          - label: "URL de Facebook"
            name: "facebook_url"
            widget: "string"
            required: false

          - label: "URL de Instagram"
            name: "instagram_url"
            widget: "string"
            required: false

          - label: "URL de LinkedIn"
            name: "linkedin_url"
            widget: "string"
            required: false
